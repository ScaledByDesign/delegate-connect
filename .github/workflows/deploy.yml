name: Deploy

# Auto-deploy on push to main (and on-demand). Runs on a GitHub-hosted runner
# with full internet so wrangler can upload the large catalog/apps.json static
# asset (the sandbox proxy cannot). Mirrors the delegatebuild deploy pattern,
# adapted for Node 24 + npm. Secrets CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
# resolve from org- or repo-level Actions secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Put node_modules/.bin on PATH (wrangler)
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Debug CF token (from runner)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token_len=${#CLOUDFLARE_API_TOKEN}"
          echo "account_id=$CLOUDFLARE_ACCOUNT_ID"
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print('list_scripts.success:',d.get('success'),'errors:',d.get('errors'))" || true

      - name: Deploy to Cloudflare
        # deploy:cloudflare = generate:catalog && build:web && copy-catalog-assets
        # && wrangler deploy --config wrangler.jsonc --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run deploy:cloudflare
